name: Daily Auto Project Generator (Gemini)

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * *'
  workflow_dispatch: {}   # manual "Run workflow" button kuda vaadukovachu, testing kosam

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout controller repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install GitHub CLI
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gh

      - name: Generate project via Gemini API
        working-directory: scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate-project.js

      - name: Create repo and push
        working-directory: scripts
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GIT_USER_NAME: ${{ github.actor }}
          GIT_USER_EMAIL: ${{ github.actor }}@users.noreply.github.com
        run: bash create-and-push.sh
